    - main [ref=e38]:
      - article [ref=e39]:
        - heading "Comunicação entre Micro-frontends" [level=1] [ref=e40]
        - paragraph [ref=e41]: In a micro-frontend architecture, each MFE is an independently deployable application. They need to communicate without tight coupling. There are two primary patterns.
        - heading "1. Event Bus (Pub-Sub)" [level=2] [ref=e42]
        - list [ref=e43]:
          - listitem [ref=e44]:
            - strong [ref=e45]: "How it works:"
            - text: MFEs publish and subscribe to events via a global event bus (e.g., using
            - code [ref=e46]: window.dispatchEvent
            - text: +
            - code [ref=e47]: addEventListener
            - text: ", or a library like"
            - code [ref=e48]: mitt
            - text: or
            - code [ref=e49]: EventEmitter
            - text: ).
          - listitem [ref=e50]:
            - strong [ref=e51]: "When to use:"
            - text: For loosely coupled, broadcast-style communication — e.g., “user logged in”, “cart updated”, “theme changed”.
          - listitem [ref=e52]:
            - strong [ref=e53]: "Pros:"
            - text: Decoupled, easy to add new listeners without modifying senders.
          - listitem [ref=e54]:
            - strong [ref=e55]: "Cons:"
            - text: Harder to debug (events fire and forget), no type safety by default.
        - code [ref=e57]: "// MFE A – publishes an event window.dispatchEvent(new CustomEvent('user:logout')); // MFE B – listens for the event window.addEventListener('user:logout', () => { // clear session, redirect, etc. });"
        - heading "2. Shared State (Global Store)" [level=2] [ref=e58]
        - list [ref=e59]:
          - listitem [ref=e60]:
            - strong [ref=e61]: "How it works:"
            - text: MFEs share a single, centralized state (e.g., Redux, Zustand, or a simple observable object) that lives in the container/shell app.
          - listitem [ref=e62]:
            - strong [ref=e63]: "When to use:"
            - text: For data that multiple MFEs need to read/write consistently — e.g., user profile, shopping cart, feature flags.
          - listitem [ref=e64]:
            - strong [ref=e65]: "Pros:"
            - text: Predictable, type-safe, easier to debug (DevTools), single source of truth.
          - listitem [ref=e66]:
            - strong [ref=e67]: "Cons:"
            - text: Couples MFEs to the store contract; changes to state shape affect all consumers.
        - code [ref=e69]: "// Shared store (defined in the container) const useStore = create((set) => ({ user: null, setUser: (user) => set({ user }), })); // MFE A – sets the user useStore.getState().setUser(loggedInUser); // MFE B – reads the user const user = useStore((state) => state.user);"
        - heading "My Approach (Real-World)" [level=2] [ref=e70]
        - paragraph [ref=e71]:
          - text: In
          - strong [ref=e72]: Seguralta
          - text: ", we combined both patterns:"
        - list [ref=e73]:
          - listitem [ref=e74]: Shared Redux store for application-wide data (user session, feature flags, tenant config).
          - listitem [ref=e75]: Event bus for UI-level interactions (“open modal”, “refresh dashboard”, “toast notification”) — they didn’t need to persist in state and we didn’t want to pollute the store.
        - heading "Key Considerations" [level=2] [ref=e76]
        - list [ref=e77]:
          - listitem [ref=e78]:
            - strong [ref=e79]: "Versioning:"
            - text: If the shared state contract changes, all MFEs need to update — ver
            - link "versionamento da lib compartilhada" [ref=e80] [cursor=pointer]:
              - /url: /notas/shared-component-library-versioning/
            - text: .
          - listitem [ref=e81]:
            - strong [ref=e82]: "Lazy Loading:"
            - text: "Avoid importing the entire store into every MFE — use selective slices. Relacionado:"
            - link "code-splitting" [ref=e83] [cursor=pointer]:
